name: Website

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload standalone output
        uses: actions/upload-artifact@v4
        with:
          name: website-standalone
          path: |
            website/.next/standalone
            website/.next/static
            website/public
          if-no-files-found: warn
          retention-days: 14
